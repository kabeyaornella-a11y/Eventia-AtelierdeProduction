[build]
  command = "npm run build"
  publish = "dist"

# Pas de redirect SPA vers /index.html : le preset Nitro "netlify" génère une
# fonction serverless (SSR) qui gère le routage (config.path = "/*",
# preferStatic = true → fichiers statiques de dist/ servis en priorité,
# tout le reste passe par la fonction). Un redirect catch-all vers /index.html
# casserait ce mécanisme (il n'existe pas d'index.html statique en SSR).

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com https://www.eventiasignature.com; media-src 'self' https://res.cloudinary.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.resend.com; frame-src https://gumroad.com https://app.gumroad.com; object-src 'none'; base-uri 'self';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
