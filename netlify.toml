[build]
  base    = "."
  command = "pnpm install && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/eventia-studio run build"
  publish = "artifacts/eventia-studio/dist/public"

[build.environment]
  NODE_VERSION      = "20"
  VITE_API_BASE     = "https://workspaceapi-server-production-d59c.up.railway.app"

# SPA routing — toutes les routes renvoient vers index.html
[[redirects]]
  from   = "/eventia-studio/*"
  to     = "/eventia-studio/index.html"
  status = 200

[[redirects]]
  from   = "/i/*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
